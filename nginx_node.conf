limit_req_zone $binary_remote_addr zone=agent:10m rate=30r/m;

server {
    listen 80;
    server_name YOUR_NODE_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_NODE_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_NODE_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_NODE_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # فقط Main VPS مجاز:
    # allow YOUR_MAIN_VPS_IP;
    # deny  all;

    location = /health  { limit_req zone=agent burst=10 nodelay; proxy_pass http://127.0.0.1:8765/health;  proxy_read_timeout 20s; }
    location = /metrics { limit_req zone=agent burst=5  nodelay; proxy_pass http://127.0.0.1:8765/metrics; proxy_read_timeout 30s; }
    location / { return 404; }

    access_log /var/log/nginx/agent_access.log;
    error_log  /var/log/nginx/agent_error.log;
}
